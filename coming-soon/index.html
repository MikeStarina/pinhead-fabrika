  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #0A0A0A; --white: #fff; --blue: #1D19EA; --gray: #F5F5F5; --gray-mid: #E8E8E8; --radius: 16px; --radius-lg: 24px; }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 64px; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .nav-logo { text-decoration: none; }

    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 40px; text-align: center;
    }
    .asterisk {
      font-size: 80px; color: var(--blue); line-height: 1;
      margin-bottom: 32px;
      display: inline-block;
      animation: spin 20s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 8vw, 96px);
      line-height: 1; margin-bottom: 20px;
    }
    h1 span { color: var(--blue); }
    p {
      font-size: 16px; line-height: 1.7;
      color: rgba(255,255,255,0.45); max-width: 480px; margin-bottom: 40px;
    }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .btn-back {
      background: var(--white); color: var(--black);
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 16px 32px; text-decoration: none; border-radius: 10px;
      transition: background 0.15s;
    }
    .btn-back:hover { background: var(--blue); color: var(--white); }
    .btn-zayavka {
      background: var(--blue); color: var(--white);
      font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 16px 32px; text-decoration: none; border-radius: 10px;
      transition: background 0.15s;
    }
    .btn-zayavka:hover { background: rgba(29,25,234,0.8); }

    footer {
      padding: 24px 40px; border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 12px;
    }
    footer span { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.25); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      main { padding: 40px 20px; }
      footer { padding: 20px; }
    }
  </style>
